name: Deploy to Production

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # 1. Navigate to project root and pull latest changes
            cd /var/www/creatorinstance
            git fetch --all
            git reset --hard origin/main
            
            # 2. Deploy Backend
            cd backend
            npm install
            npm run build
            # Restart backend using PM2 (assuming the process is named 'backend' or similar)
            # If using another process manager or just node, adjust this command:
            pm2 restart backend || pm2 start dist/index.js --name backend
            
            # 3. Deploy Frontend
            cd ../frontend
            npm install
            # Re-inject env variables into frontend build if needed, 
            # though usually they are read from the .env file on the server.
            npm run build
            
            echo "✅ Deployment complete!"
